{% if cell.slot.text %}
  <span data-flex-segment data-flex-zone="" data-flex-t="" data-flex-special="" data-flex-type="" data-flex-reps="" data-flex-distance="" data-flex-duration="" data-flex-norm="">{{ cell.slot.text|linebreaksbr }}</span>
{% else %}
  {% for seg in cell.slot.segments.all %}
    {% if seg.text %}
      {% include "core/partials/segment_display.html" with seg=seg %}
    {% endif %}
  {% endfor %}
{% endif %}
