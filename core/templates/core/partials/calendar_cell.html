<td id="cell-{{ day|date:'Ymd' }}-{{ slot_index }}"
    {% if oob %}hx-swap-oob="outerHTML"{% endif %}
    class="calcell"
    style="position: relative;">

  <style>
    .calcell .action-btn {
      opacity: 0;
      pointer-events: none;
      transition: opacity 80ms ease-in-out;
    }
    .calcell:hover .action-btn,
    .calcell:focus-within .action-btn {
      opacity: 1;
      pointer-events: auto;
    }
  </style>

  {% if slot %}
    <button type="button" class="btn btn-sm btn-outline-secondary action-btn"
      style="position:absolute; top:4px; left:4px; padding:0px 6px; font-size:11px; line-height:1.2; z-index:2;"
      hx-post="/slot-copy/{{ day|date:'Y' }}/{{ day|date:'m' }}/{{ day|date:'d' }}/{{ slot_index }}/{% if selected_plan %}?plan={{ selected_plan.id }}{% endif %}{% if selected_athlete %}&athlete={{ selected_athlete.id }}{% endif %}"
      hx-swap="none" onclick="event.stopPropagation();" title="Kopieer dit slot">Kopieer</button>
  {% endif %}

  {% if request.session.training_clipboard %}
    <button type="button" class="btn btn-sm btn-outline-primary action-btn"
      style="position:absolute; top:4px; right:4px; padding:0px 6px; font-size:11px; line-height:1.2; z-index:2;"
      hx-post="/slot-paste/{{ day|date:'Y' }}/{{ day|date:'m' }}/{{ day|date:'d' }}/{{ slot_index }}/{% if selected_plan %}?plan={{ selected_plan.id }}{% endif %}{% if selected_athlete %}&athlete={{ selected_athlete.id }}{% endif %}"
      hx-target="#cell-{{ day|date:'Ymd' }}-{{ slot_index }}" hx-swap="outerHTML"
      onclick="event.stopPropagation();" title="Plak">Plak</button>
  {% endif %}

  {% if slot %}
    {% with ct=slot.core_text|default:"" %}
      {% with ctl=ct|lower %}
        <a class="celllink" href="#"
           hx-get="/slot-modal/{{ day|date:'Y' }}/{{ day|date:'m' }}/{{ day|date:'d' }}/{{ slot_index }}/{% if selected_plan or selected_athlete %}?{% endif %}{% if selected_plan %}plan={{ selected_plan.id }}{% endif %}{% if selected_athlete %}{% if selected_plan %}&{% endif %}athlete={{ selected_athlete.id }}{% endif %}"
           hx-target="#modal-container" hx-swap="innerHTML"
           {% if "z1" in ctl %}style="background-color:#f8f8f0;"
           {% elif "z2" in ctl or "tm" in ctl %}style="background-color:#f7c6d0;"
           {% elif "z3" in ctl or "thm" in ctl %}style="background-color:#e5533d;"
           {% elif "z4" in ctl %}style="background-color:#bfe7bf;"
           {% elif "z5" in ctl or "t4" in ctl %}style="background-color:#2f75b5;"
           {% elif "z6" in ctl %}style="background-color:#f2c200;"
           {% endif %}>
          <span class="celltext">
            {% if slot.core_text %}<div><strong>{{ slot.core_text }}</strong></div>{% endif %}
          </span>
        </a>
      {% endwith %}
    {% endwith %}
  {% endif %}
</td>
