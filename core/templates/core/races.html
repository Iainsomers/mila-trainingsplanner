{% extends "core/base.html" %}

{% block title %}Races{% endblock %}

{% block content %}
<div class="container py-4">

  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h1 class="mb-1">Races</h1>
    </div>
    <div>
      <a href="/" class="btn btn-outline-secondary">Back to dashboard</a>
    </div>
  </div>

  <div class="row g-4">

    <div class="col-md-6">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Race Calendar</h5>
          <p class="card-text">Manage races and available distances.</p>
          <div class="mt-auto">
            <a href="{% url 'race_calendar' %}" class="btn btn-primary w-100">Open</a>
          </div>
        </div>
      </div>
    </div>

    <div class="col-md-6">
      <div class="card h-100">
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">Race Select</h5>
          <p class="card-text">Select race distances per group or athlete.</p>
          <div class="mt-auto">
            <a href="{% url 'race_select' %}" class="btn btn-primary w-100">Open</a>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
